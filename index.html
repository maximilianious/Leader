<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
<title>LEADER — Film &amp; Pro Camera</title>
<meta name="description" content="A two-personality camera: a grainy digital-film mode and a clean professional mode. Shoot, grade, save to your camera roll." />
<meta name="theme-color" content="#15140f" />
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" href="icons/icon-180.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Leader" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
</head>
<body>

<div id="app">

  <!-- ===== Top readout bar (sprocket / frame counter) ===== -->
  <header class="readout" aria-hidden="false">
    <div class="sprockets" aria-hidden="true">
      <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
    </div>
    <div class="readout-row">
      <button id="btnFlip" class="iconbtn" title="Flip camera" aria-label="Flip camera">
        <svg viewBox="0 0 24 24" fill="none"><path d="M4 8h3.5L9 6h6l1.5 2H20a1 1 0 011 1v9a1 1 0 01-1 1H4a1 1 0 01-1-1V9a1 1 0 011-1z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><circle cx="12" cy="13.5" r="3.4" stroke="currentColor" stroke-width="1.5"/><path d="M14.5 3.5l1.8 1.8-1.8 1.8M9.5 3.5l-1.8 1.8 1.8 1.8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>

      <div class="frame-counter" id="frameCounter">
        <span class="fc-label">FRAME</span>
        <span class="fc-num" id="fcNum">001</span>
      </div>

      <button id="btnFlash" class="iconbtn" title="Flash" aria-label="Toggle flash" data-state="off">
        <svg viewBox="0 0 24 24" fill="none"><path d="M12.5 2.5l-7 11h4.5l-1 8 7-11h-4.5l1-8z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/></svg>
      </button>
    </div>
  </header>

  <!-- ===== Viewfinder ===== -->
  <main class="viewfinder">
    <video id="video" autoplay muted playsinline></video>
    <canvas id="canvas"></canvas>
    <canvas id="captureCanvas" class="hidden"></canvas>

    <div class="grade-overlay" id="gradeOverlay" aria-hidden="true"></div>
    <div class="vf-mask" aria-hidden="true">
      <span class="corner tl"></span><span class="corner tr"></span><span class="corner bl"></span><span class="corner br"></span>
    </div>

    <div class="flash-pop" id="flashPop" aria-hidden="true"></div>

    <p class="permission-msg" id="permMsg">
      <span class="pm-title">LEADER needs your camera</span>
      <span class="pm-body">Tap to grant access — nothing leaves your device.</span>
      <button id="btnGrant" class="btn-primary">Enable camera</button>
    </p>

    <div class="last-shot" id="lastShot" aria-hidden="true">
      <img id="lastShotImg" alt="Last photo taken" />
    </div>
  </main>

  <!-- ===== Mode toggle: DIGITAL / PRO ===== -->
  <nav class="mode-switch" role="tablist" aria-label="Camera personality">
    <button class="mode-btn active" data-mode="digital" role="tab" aria-selected="true">
      <span class="mode-dot"></span>DIGITAL
    </button>
    <button class="mode-btn" data-mode="pro" role="tab" aria-selected="false">
      <span class="mode-dot"></span>PROFESSIONAL
    </button>
  </nav>

  <!-- ===== Look dial (filmstock / grade picker) ===== -->
  <div class="dial-wrap">
    <button class="dial-arrow left" id="dialLeft" aria-label="Previous look">‹</button>
    <ul class="dial" id="dial" role="listbox" aria-label="Looks"></ul>
    <button class="dial-arrow right" id="dialRight" aria-label="Next look">›</button>
  </div>

  <!-- ===== Bottom control deck ===== -->
  <footer class="deck">
    <button class="deck-side" id="btnGallery" title="Saved photos" aria-label="Saved photos">
      <span class="thumb-frame" id="thumbFrame">
        <svg viewBox="0 0 24 24" fill="none"><rect x="3" y="5" width="18" height="14" rx="2" stroke="currentColor" stroke-width="1.5"/><circle cx="8.5" cy="10.5" r="1.5" fill="currentColor"/><path d="M3 16l5-4 4 3 4-5 5 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </span>
    </button>

    <button class="shutter" id="btnShutter" aria-label="Take photo">
      <span class="shutter-ring"></span>
      <span class="shutter-core"></span>
    </button>

    <button class="deck-side" id="btnInfo" title="Look details" aria-label="Look details">
      <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.5"/><path d="M12 11v5.2M12 8.3v.1" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
    </button>
  </footer>

  <p class="current-look" id="currentLookLabel">KODACOLOR 400</p>

</div>

<!-- ===== Gallery (camera roll within the app) ===== -->
<section class="gallery hidden" id="gallery">
  <header class="gallery-head">
    <h2>Your Roll</h2>
    <button id="btnCloseGallery" class="iconbtn" aria-label="Close gallery">
      <svg viewBox="0 0 24 24" fill="none"><path d="M5 5l14 14M19 5L5 19" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
    </button>
  </header>
  <div class="gallery-grid" id="galleryGrid"></div>
  <p class="gallery-empty" id="galleryEmpty">No frames yet. Shoot something.</p>
</section>

<!-- ===== Single-photo viewer / save sheet ===== -->
<section class="viewer hidden" id="viewer">
  <button class="viewer-close" id="btnCloseViewer" aria-label="Close">
    <svg viewBox="0 0 24 24" fill="none"><path d="M5 5l14 14M19 5L5 19" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
  </button>
  <img id="viewerImg" alt="Photo" />
  <div class="viewer-tag" id="viewerTag"></div>
  <div class="viewer-actions">
    <button class="btn-primary" id="btnSave">Save to Photos</button>
    <button class="btn-ghost" id="btnDelete">Delete</button>
  </div>
</section>

<div class="toast" id="toast"></div>

<script src="app.js"></script>
</body>
</html>
